<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seesaw Mechanism</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div id="infos">
      <div class="stats">
        <h3>Left Total Weight</h3>
        <div class="stat-box">
          <span id="left-total-weight">0 kg</span>
        </div>
      </div>
      <div class="center-stats">
        <div class="stat-item">Next: <span class="badge" id="next-weight">? kg</span></div>
        <div class="stat-item">Angle: <span id="angle">0°</span></div>
      </div>
      <div class="stats">
        <h3>Right Total Weight</h3>
        <div class="stat-box">
          <span id="right-total-weight">0 kg</span>
        </div>
      </div>
    </div>

    <div id="mechanism">
      <div id="seesaw">
        <div id="plank">
          <div class="weight" id="weight-preview"></div>
        </div>
        <div id="pivot"></div>
      </div>
    </div>

    <div class="buttons">
      <button id="reset-btn">Reset Mechanism</button>
      <button id="pause-btn">Pause Mechanism</button>
    </div>

    <div id="history-wrapper">
      <h3>Activity History</h3>
      <div id="history-container">
        <div class="history-entry placeholder">No action has been taken.</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
